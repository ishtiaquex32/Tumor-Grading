# ==========================================================
# Model Configuration
# ==========================================================

# Available models:
#
# resnet3d
# x3d
# vit_unetr
# swin_unetr
# fusion_resnet
# fusion_x3d
# fusion_vit
# fusion_swin

model_name: fusion_x3d

num_classes: 2

input_channels: 4

image_size:
  - 96
  - 96
  - 96

# ==========================================================
# Backbone parameters
# ==========================================================

resnet3d:

  embedding_dim: 128

x3d:

  pretrained: true

  embedding_dim: 128

vit_unetr:

  hidden_size: 768

  feature_size: 16

  mlp_dim: 3072

  num_heads: 12

  embedding_dim: 128

swin_unetr:

  feature_size: 48

  embedding_dim: 128

# ==========================================================
# Fusion
# ==========================================================

fusion:

  tda_embedding_dim: 128

  cnn_embedding_dim: 128

  hidden_dim: 128

  dropout: 0.40

# ==========================================================
# TDA
# ==========================================================

tda:

  feature_dimension: 364

# ==========================================================
# Radiomics
# ==========================================================

radiomics:

  feature_dimension: 100
