# ==========================================================
# Training Configuration
# ==========================================================

seed: 42

device: cuda

epochs: 50

batch_size: 2

learning_rate: 0.0001

weight_decay: 0.00001

optimizer: AdamW

scheduler:

  name: ReduceLROnPlateau

  mode: max

  factor: 0.5

  patience: 3

loss:

  name: CrossEntropyLoss

mixed_precision: true

num_workers: 4

pin_memory: true

persistent_workers: true

drop_last: true

early_stopping:

  enabled: true

  patience: 12

  monitor: auc

  mode: max

checkpoint:

  save_best_only: true

  monitor: auc

metric:

  threshold: 0.50

logging:

  print_every: 1